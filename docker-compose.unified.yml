# PushMyCV — Coolify-Ready Docker Compose
# Deploy: coolify will read this file directly from your Git repo
# Each service gets its own domain via Coolify labels below

version: '3.8'

services:
  # ============================================
  # Next.js Frontend → pushmycv.com
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pushmycv-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_FASTIFY_API_URL=${NEXT_PUBLIC_FASTIFY_API_URL:-https://api.pushmycv.com}
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_KEY}
    networks:
      - pushmycv-internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      - "coolify.enabled=true"
      - "coolify.type=application"
      - "coolify.name=pushmycv-frontend"
      - "coolify.port=3000"
      - "coolify.fqdn=https://pushmycv.com"
      - "coolify.healthCheckPath=/"
      - "coolify.healthCheckInterval=30"
      # Traefik labels for Coolify proxy
      - "traefik.enable=true"
      - "traefik.http.routers.pushmycv-frontend.rule=Host(`pushmycv.com`)"
      - "traefik.http.routers.pushmycv-frontend.entrypoints=https"
      - "traefik.http.routers.pushmycv-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.pushmycv-frontend.loadbalancer.server.port=3000"

  # ============================================
  # Fastify API → api.pushmycv.com
  # ============================================
  api:
    build:
      context: ./fastify-api
      dockerfile: Dockerfile
    container_name: pushmycv-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - SUPABASE_URL=${FASTIFY_SUPABASE_URL}
      - SUPABASE_KEY=${FASTIFY_SUPABASE_KEY}
      - JOBEAZY_SUPABASE_URL=${SUPABASE_URL}
      - JOBEAZY_SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
      - WORKER_POLL_INTERVAL=5000
      - WORKER_MAX_RETRIES=5
    networks:
      - pushmycv-internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    labels:
      - "coolify.enabled=true"
      - "coolify.type=application"
      - "coolify.name=pushmycv-api"
      - "coolify.port=3001"
      - "coolify.fqdn=https://api.pushmycv.com"
      - "coolify.healthCheckPath=/health"
      - "coolify.healthCheckInterval=30"
      # Traefik labels for Coolify proxy
      - "traefik.enable=true"
      - "traefik.http.routers.pushmycv-api.rule=Host(`api.pushmycv.com`)"
      - "traefik.http.routers.pushmycv-api.entrypoints=https"
      - "traefik.http.routers.pushmycv-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.pushmycv-api.loadbalancer.server.port=3001"

  # ============================================
  # Fastify Queue Worker (internal only — no public port)
  # ============================================
  fastify-worker:
    build:
      context: ./fastify-api
      dockerfile: Dockerfile
    container_name: pushmycv-fastify-worker
    restart: unless-stopped
    command: node dist/workers/queueWorker.js
    environment:
      - NODE_ENV=production
      - SUPABASE_URL=${FASTIFY_SUPABASE_URL}
      - SUPABASE_KEY=${FASTIFY_SUPABASE_KEY}
      - JOBEAZY_SUPABASE_URL=${SUPABASE_URL}
      - JOBEAZY_SUPABASE_KEY=${SUPABASE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - pushmycv-internal
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "coolify.enabled=true"
      - "coolify.type=application"
      - "coolify.name=pushmycv-fastify-worker"
      - "coolify.ignore=true"

  # ============================================
  # Python Agentic Worker (internal only — no public port)
  # ============================================
  agentic:
    build:
      context: ./agentic
      dockerfile: Dockerfile
    container_name: pushmycv-agentic
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FASTIFY_SUPABASE_URL=${FASTIFY_SUPABASE_URL}
      - FASTIFY_SUPABASE_KEY=${FASTIFY_SUPABASE_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    networks:
      - pushmycv-internal
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "coolify.enabled=true"
      - "coolify.type=application"
      - "coolify.name=pushmycv-agentic"
      - "coolify.ignore=true"

  # ============================================
  # Redis (optional, for caching/sessions)
  # Uncomment if needed
  # ============================================
