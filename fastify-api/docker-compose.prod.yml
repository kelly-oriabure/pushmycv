version: '3.8'

services:
  # Production Fastify API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pushmycv-api-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - WORKER_POLL_INTERVAL=${WORKER_POLL_INTERVAL:-5000}
      - WORKER_MAX_RETRIES=${WORKER_MAX_RETRIES:-5}
    networks:
      - pushmycv-network
    restart: always
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Redis for production
  redis:
    image: redis:7-alpine
    container_name: pushmycv-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pushmycv-network
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  # Redis Commander - Web UI for Redis
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: pushmycv-redis-ui-prod
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - HTTP_USER=${REDIS_UI_USER:-admin}
      - HTTP_PASSWORD=${REDIS_UI_PASSWORD:-changeme}
    networks:
      - pushmycv-network
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: pushmycv-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - pushmycv-network
    depends_on:
      - api
    restart: always

networks:
  pushmycv-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
