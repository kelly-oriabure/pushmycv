# Deploy to Coolify on push to main
name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/ci.yml'

# Cancel in-progress deploys for the same branch
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Coolify auto-deploy: if your app has "Auto Deploy" enabled in the
      # Coolify UI, every push to main will trigger a deploy automatically.
      # No extra steps needed.

      # Manual trigger via Coolify API (if auto-deploy is not enabled):
      # Required secrets:
      #   COOLIFY_API_URL    — e.g. https://coolify.firmoncloud.com
      #   COOLIFY_API_TOKEN  — API token from Coolify UI
      #   COOLIFY_APP_UUID   — Application UUID from Coolify
      - name: Deploy via Coolify API
        if: ${{ secrets.COOLIFY_API_TOKEN != '' && secrets.COOLIFY_APP_UUID != '' }}
        run: |
          echo "Triggering Coolify deploy for ${{ secrets.COOLIFY_APP_UUID }}..."
          RESPONSE=$(curl -s -X POST \
            "${{ secrets.COOLIFY_API_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --fail-with-body)
          
          echo "$RESPONSE" | python3 -m json.tool
          
          # Extract deployment UUID
          DEPLOY_UUID=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          deployments = data.get('deployments', [])
          if deployments:
              print(deployments[0].get('deployment_uuid', 'unknown'))
          else:
              print('unknown')
          ")
          
          echo "✅ Deployment queued: $DEPLOY_UUID"
          echo "Deployment UUID=$DEPLOY_UUID" >> $GITHUB_OUTPUT
