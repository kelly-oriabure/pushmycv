# CI: Test on every PR and push
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Frontend tests
  # ============================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test -- --passWithNoTests

  # ============================================
  # Fastify API tests
  # ============================================
  api-test:
    name: API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastify-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fastify-api/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test -- --passWithNoTests

  # ============================================
  # Agentic Python tests
  # ============================================
  agentic-test:
    name: Agentic Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: agentic/requirements.txt

      - run: pip install -r requirements.txt
      - run: python -m pytest --co -q || true  # List tests (don't fail if none exist)
